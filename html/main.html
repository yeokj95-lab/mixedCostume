<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8" />
	<title>Dropbox 선택</title>
</head>
<body>
<div id="content"></div>
</body>
<script>
fetch('./data/content.txt')
  .then(res => res.text())
  .then(text => {
    document.getElementById('content').innerText = text;
  });
</script>
</html>
