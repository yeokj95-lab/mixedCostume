<script>
fetch('../data/pose.txt').then(res => res.text()).then(text => {
	const lines = text.split(/\r?\n/);
	lines.forEach((line, index) => {
		if (line.trim() === '') {return;} 
		else {$('#pose').append('<option value="'+line.split(" -> ")[0]+'">'+line+'</option>');}
    });
	$('#pose').append('<option value="random" selected>랜덤 선택</option>');
  }).catch(err => {  console.error(err); });
fetch('../data/clothes.txt').then(res => res.text()).then(text => {

function showToast(message) {
    $('#toast').text(message).addClass('show');
    setTimeout(function () { $('#toast').removeClass('show'); }, 2000);
}
function getPose(poseVal,scr_type)
{
	
	var poseInd = Math.floor(Math.random() * ($("#pose option").length - 1));
	var poseStr = (poseVal === "random")?$("#pose option").eq(poseInd).text():$('#pose option[value="'+poseVal+'"]').text();
	$("#rslt_pose").text(poseStr.split(" -> ")[0]);
	poseStr = poseStr.split(" -> ")[1];
	if(scr_type=="f")
	{
		var split_pose = poseStr.split(",");
		var tmp_pose = [];
		for( var i=0;i<split_pose.length;i++)
		{
			if(split_pose[i].indexOf("구도") >= 0 || split_pose[i].indexOf("로우앵글") >= 0 || split_pose[i].indexOf("로우 앵글") >= 0 
					|| split_pose[i].indexOf("하이앵글") >= 0 || split_pose[i].indexOf("하이 앵글") >= 0 
			  		|| split_pose[i].indexOf("프레이밍") >= 0 || split_pose[i].indexOf("배경") >= 0 )
				continue;
			else
				tmp_pose.push(split_pose[i]);
		}
		poseStr = tmp_pose.join(",");
	}
	
	return poseStr;
}
function getClothes(cloVal)
{
	var cloInd = Math.floor(Math.random() * ($("#clothes option").length - 1));
	var cloStr = (cloVal === "random")?$("#clothes option").eq(cloInd).text():$('#clothes option[value="'+cloVal+'"]').text();
	$("#rslt_clothes").text(cloStr.split(" -> ")[0]);
	return cloStr.split(" -> ")[1];
}
function getBackground(bgVal)
{
	var bgInd = Math.floor(Math.random() * ($("#background option").length - 1));
	var bgStr = (bgVal === "random")?$("#background option").eq(bgInd).text():$('#background option[value="'+bgVal+'"]').text();
	$("#rslt_background").text(bgStr.split(" -> ")[0]);
	return bgStr.split(" -> ")[1];
}
function getMember(memcnt)
{
	if ($("#copycheck").val() == "copy")
	{
		$('.sel_tmp').addClass("sel_com");
		$('.sel_tmp').find('input[name="who"]').prop('checked', true);
		$('.sel_tmp').removeClass("sel_tmp");
		$("#copycheck").val("init");
	}
	
	var memBox = $('input[name="who"]:not(:checked)');
	if (memBox.length == 0 || memcnt > memBox.length)
	{
		showToast("No Member");
		return;
	}
	memBox.parent().removeClass("sel_tmp");
	var indList = [];
	for(var i=0;i<memcnt;i++)
	{
		var memInd = Math.floor(Math.random() * memBox.length);
		if (!indList.includes(memInd)) 
			indList.push(memInd);
		else 
			i--;
	}
	
	for(var i=0;i<indList.length;i++)
	{
		memBox.eq(indList[i]).parent().addClass("sel_tmp");
	}
}

async function copyText() 
{
	const text = $("#result").val();
	try	{ await navigator.clipboard.writeText(text); } 
	catch (err) {console.error(err);}
	
	$("#copycheck").val("copy");
	$("#rslt_str").removeClass("dp_n");
	showToast("Copied");
}
